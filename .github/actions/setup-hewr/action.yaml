name: "Set up hewr"
description: "This action sets up R with the hewr package installed."
inputs: {}
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6

    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: "release"
        use-public-rspm: true

    - name: Install pak
      run: install.packages("pak")
      shell: Rscript {0}

    - name: Install hewr dependencies and package
      env:
        GITHUB_PAT: ${{ github.token }}
      run: |
        pak::pkg_install(c("any::covr", "any::xml2"), ask = FALSE, upgrade = FALSE)
        pak::local_install("hewr", dependencies = TRUE, ask = FALSE, upgrade = FALSE)
      shell: Rscript {0}
