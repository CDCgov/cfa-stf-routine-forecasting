name: R CMD check stfroutineforecasting

on:
  pull_request:
    branches: [main]
    paths:
      # Explicitly include paths that should trigger the workflow
      - 'stfroutineforecasting/**'
      - '.github/workflows/r-cmd-check.yaml'
      - '.github/actions/setup-routine-forecasting-r/action.yaml'
  push:
    branches: [main]
    paths:
      # Explicitly include paths that should trigger the workflow
      - 'stfroutineforecasting/**'
      - '.github/workflows/r-cmd-check.yaml'
      - '.github/actions/setup-routine-forecasting-r/action.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-stfroutineforecasting:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on:  ${{matrix.os}}
    steps:
    - uses: actions/checkout@v6

    - name: Set up routine forecasting R
      uses: ./.github/actions/setup-routine-forecasting-r

    - name: "Check stfroutineforecasting package"
      uses: r-lib/actions/check-r-package@v2
      with:
        working-directory: stfroutineforecasting
