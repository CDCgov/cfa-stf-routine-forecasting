name: test

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  dagster-defs-test:
    name: Validate Dagster definitions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up routine forecasting Python
        uses: ./.github/actions/setup-routine-forecasting-python

      - name: Check Dagster definitions
        env:
          DAGSTER_USER: test
        run: uv run dg check defs

  pipelines-test:
    name: Run python tests and collect coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up routine forecasting Python
        uses: ./.github/actions/setup-routine-forecasting-python

      - name: Set up routine forecasting Julia
        uses: ./.github/actions/setup-routine-forecasting-julia

      - name: Set up routine forecasting R
        uses: ./.github/actions/setup-routine-forecasting-r

      - name: run tests
        env:
          XLA_FLAGS: --xla_force_host_platform_device_count=2
        run: |
          uv run pytest \
            -m "not pipeline_e2e" \
            --cov=pipelines --cov-report=term --cov-report=xml:pipelines-coverage.xml \
            pipelines/tests

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v7
        with:
          env_vars: OS,PYTHON
          fail_ci_if_error: true
          flags: pipelines
          files: pipelines-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  stfroutineforecasting-test:
    name: Run stfroutineforecasting tests and collect coverage
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up routine forecasting R
        uses: ./.github/actions/setup-routine-forecasting-r

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            path = "stfroutineforecasting",
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          files: ./cobertura.xml
          plugins: noop
          flags: stfroutineforecasting
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
